    // Insert after the first child (bg div)
    var bgDiv = hero.firstChild;
    hero.insertBefore(vid, bgDiv ? bgDiv.nextSibling : null);

    // Shimmer headings
    function shimmer(){
      document.querySelectorAll('[class*="font-black"][class*="text-transparent"]').forEach(function(el){
        el.style.background='linear-gradient(90deg,#480082,#6F00FE,#9B30FF,#C060FF,#9B30FF,#6F00FE,#480082)';
        el.style.backgroundSize='250% auto';
        el.style.webkitBackgroundClip='text';
        el.style.backgroundClip='text';
        el.style.webkitTextFillColor='transparent';
        el.style.animation='vvShimmer 8s linear infinite';
      });
    }
    setTimeout(shimmer,600);
    setTimeout(shimmer,1500);
    setTimeout(shimmer,3000);
  }

  document.readyState==='loading'
    ? document.addEventListener('DOMContentLoaded',function(){setTimeout(run,500)})
    : setTimeout(run,500);
})();
</script>

<script id="vv-admin-js">
(function(){
  const SB_URL = 'https://jcgvkyizoimwbolhfpta.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZ3ZreWl6b2ltd2JvbGhmcHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDMwMjQsImV4cCI6MjA4NTg3OTAyNH0.a8gjkPoUHQ1kgROa2Lqaq3252opqg5CPMm6vR3t1NOk';
  let currentTab = 'leads';
  let currentData = [];

  // Check URL param
  if(new URLSearchParams(window.location.search).get('admin') === '1'){
    setTimeout(function(){
      document.getElementById('vv-admin-overlay').style.display = 'block';
      vvTab('leads');
    }, 800);
  }

  window.vvTab = function(tab){
    currentTab = tab;
    ['leads','emails','analytics'].forEach(function(t){
      var el = document.getElementById('tab-'+t);
      if(el) el.style.background = t===tab ? 'linear-gradient(90deg,#480082,#6F00FE)' : 'rgba(255,255,255,0.05)';
      if(el) el.style.border = t===tab ? 'none' : '1px solid rgba(255,255,255,0.1)';
    });
    vvLoad(tab);
  };

  window.vvLoad = async function(tab){
    var table = tab==='leads'?'vv_leads':tab==='emails'?'vv_email_signups':'vv_analytics_events';
    document.getElementById('vv-table-title').textContent = tab==='leads'?'Leads':tab==='emails'?'Email Signups':'Analytics Events';
    document.getElementById('vv-table-body').innerHTML = '<p style="padding:20px;color:rgba(255,255,255,0.4);font-size:13px">Loading...</p>';

    try {
      var res = await fetch(SB_URL+'/rest/v1/'+table+'?select=*&order=created_at.desc&limit=200', {
        headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY }
      });
      var data = await res.json();
      currentData = data;
      vvRenderTable(data, tab);
      vvRenderStats(data, tab);
    } catch(e) {
      document.getElementById('vv-table-body').innerHTML = '<p style="padding:20px;color:#ff6b6b;font-size:13px">Error loading data. Check Supabase RLS policies.</p>';
    }
  };

  window.vvRenderStats = function(data, tab){
    var today = new Date().toDateString();
    var todayCount = data.filter(function(r){ return new Date(r.created_at).toDateString()===today; }).length;
    var stats = document.getElementById('vv-stats');
    stats.innerHTML = [
      {label:'Total',value:data.length},
      {label:'Today',value:todayCount},
      {label:'This Week',value:data.filter(function(r){return (Date.now()-new Date(r.created_at))<=7*864e5;}).length}
    ].map(function(s){
      return '<div style="background:rgba(111,0,254,0.08);border:1px solid rgba(111,0,254,0.2);border-radius:10px;padding:16px 20px"><div style="font-size:28px;font-weight:900;color:#9B30FF">'+s.value+'</div><div style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:4px">'+s.label+'</div></div>';
    }).join('');
  };

  window.vvRenderTable = function(data, tab){
    if(!data.length){
      document.getElementById('vv-table-body').innerHTML = '<p style="padding:20px;color:rgba(255,255,255,0.4);font-size:13px">No data yet.</p>';
      return;
    }
    var cols = Object.keys(data[0]);
    var html = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr>'+cols.map(function(c){return '<th style="padding:10px 16px;text-align:left;color:rgba(255,255,255,0.4);font-weight:700;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap">'+c+'</th>';}).join('')+'</tr></thead>';
    html += '<tbody>'+data.map(function(row,i){
      return '<tr style="background:'+(i%2===0?'rgba(255,255,255,0.01)':'transparent')+'">'+cols.map(function(c){
        var val = row[c]===null?'—':typeof row[c]==='object'?JSON.stringify(row[c]).slice(0,60):String(row[c]).slice(0,80);
        return '<td style="padding:10px 16px;color:rgba(255,255,255,0.75);border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap">'+val+'</td>';
      }).join('')+'</tr>';
    }).join('')+'</tbody></table>';
    document.getElementById('vv-table-body').innerHTML = html;
  };

  window.vvExport = function(){
    if(!currentData.length) return;
    var cols = Object.keys(currentData[0]);
    var csv = cols.join(',')+'\n'+currentData.map(function(row){
      return cols.map(function(c){
        var v = row[c]===null?'':typeof row[c]==='object'?JSON.stringify(row[c]):String(row[c]);
        return '"'+v.replace(/"/g,'""')+'"';
      }).join(',');
    }).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = 'vividverse-'+currentTab+'-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };
})();
</script>
